name: Test Python Pipeline

on:
  push:
    branches: [main]
    paths:
      - "Python/**"
      - "tests/**"
      - "assignment/**"
      - ".github/workflows/test-python.yml"
  pull_request:
    branches: [main]
    paths:
      - "Python/**"
      - "tests/**"
      - "assignment/**"
      - ".github/workflows/test-python.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: "sk-test-dummy-key-for-ci"
      BASE_LAB_DIR: "${{ github.workspace }}/assignment"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff

      - name: Lint with ruff (pyflakes rules)
        run: ruff check Python/ tests/ conftest.py

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/R -v
